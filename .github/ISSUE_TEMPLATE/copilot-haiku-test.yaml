name: "🧪 Copilot Haiku Test"
description: "Test issue to verify Copilot picks up custom instructions and writes a haiku."
labels: ["copilot-test"]
assignees:
  - copilot-swe-agent
body:
  - type: markdown
    attributes:
      value: |
        ## Copilot Haiku Test

        **Agent Instructions:** Follow the guidelines in `.github/instructions/haiku-test.instructions.md`.

        This issue exists to test that the Copilot cloud agent picks up our
        custom instructions file and follows it. When assigned, Copilot
        should comment on this issue with a haiku — nothing else.
        Do not modify any files or write any code.

  - type: input
    id: topic
    attributes:
      label: Haiku Topic
      description: "Give Copilot a topic for the haiku."
      placeholder: "e.g. Kubernetes pods crashing at 3am"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra Context (optional)
      description: "Any additional flavor text for the haiku."
      placeholder: "The on-call engineer weeps softly..."
    validations:
      required: false
