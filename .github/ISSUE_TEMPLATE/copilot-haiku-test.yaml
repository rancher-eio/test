name: "🧪 Copilot Haiku Test"
description: "Test issue to verify Copilot picks up custom instructions and writes a haiku."
labels: ["copilot-test"]
body:
  - type: markdown
    attributes:
      value: |
        ## Copilot Haiku Test

        This issue exists to test an automated Copilot workflow. 
        When submitted, an Action will automatically ping Copilot to 
        comment on this issue with a haiku.

  - type: input
    id: topic
    attributes:
      label: Haiku Topic
      description: "Give Copilot a topic for the haiku."
      placeholder: "e.g. Kubernetes pods crashing at 3am"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Extra Context (optional)
      description: "Any additional flavor text for the haiku."
      placeholder: "The on-call engineer weeps softly..."
    validations:
      required: false
