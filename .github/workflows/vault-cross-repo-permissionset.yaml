---
name: Vault Cross-Repo PermissionSet

on:
  push:
    branches:
    - main
    paths:
    - .github/workflows/vault-cross-repo-permissionset.yaml

jobs:
  fetch:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
    - id: checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - id: fetch
      uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
      with:
        address: https://vault.rancher.kitchen
        secrets: |
          github/token/rancher-eio--test-issue-GH--issues--write token | GH_TOKEN
    - name: open test issue
      run: |
        gh issue create --repo rancher-eio/test-issue-GH --title ":robot: Test Issue from ${{ github.event.repository.name }}" --body ":sparkles: :gift: :sparkles:"
